version: '3.8'

services:
  db:
    image: postgres:15
    container_name: vocational_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vocational_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: vocational_backend
    environment:
      POSTGRES_SERVER: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vocational_db
      SECRET_KEY: "your-super-secret-key"
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
